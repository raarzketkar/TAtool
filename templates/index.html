<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAtool</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --surface: #10141a;
      --border: #1e2530;
      --border-bright: #2a3545;
      --text: #c8d4e0;
      --text-dim: #4a5a6a;
      --text-bright: #e8f0f8;
      --green: #00e676;
      --green-dim: #00e67622;
      --red: #ff1744;
      --red-dim: #ff174422;
      --amber: #ffab00;
      --amber-dim: #ffab0022;
      --accent: #00b4d8;
      --accent-dim: #00b4d815;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      padding: 4px;
    }

    .logo-icon span {
      background: var(--accent);
      display: block;
    }

    .logo-icon span:nth-child(2) { height: 60%; align-self: end; }
    .logo-icon span:nth-child(3) { height: 80%; align-self: end; }
    .logo-icon span:nth-child(1) { height: 40%; align-self: end; }

    .logo h1 {
      font-size: 14px;
      letter-spacing: 0.15em;
      color: var(--text-bright);
      font-weight: 500;
      text-transform: uppercase;
    }

    .logo p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .header-status {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* MAIN LAYOUT */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      gap: 20px;
    }

    /* SEARCH BAR */
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border-bright);
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.05em;
    }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }

    .field select option { background: var(--surface); }

    .scan-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 11px 28px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .scan-btn:hover { background: #00d4f0; transform: translateY(-1px); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s ease;
    }

    .stats-row.visible { opacity: 1; transform: translateY(0); }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
    }

    .stat-card .label {
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    .stat-card .value.up { color: var(--green); }
    .stat-card .value.down { color: var(--red); }
    .stat-card .sub {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* BIAS CARD */
    .bias-card {
      padding: 16px 20px;
      border: 1px solid;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bias-card.bullish { background: var(--green-dim); border-color: var(--green); }
    .bias-card.bearish { background: var(--red-dim); border-color: var(--red); }
    .bias-card.neutral { background: var(--amber-dim); border-color: var(--amber); }

    .bias-card .bias-label { font-size: 9px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; }
    .bias-card .bias-value { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; }
    .bias-card.bullish .bias-value { color: var(--green); }
    .bias-card.bearish .bias-value { color: var(--red); }
    .bias-card.neutral .bias-value { color: var(--amber); }

    /* CHART + SIGNALS GRID */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s ease 0.1s;
    }

    .main-grid.visible { opacity: 1; transform: translateY(0); }

    /* CHART */
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .panel-header {
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .panel-ticker {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    #chartCanvas {
      width: 100%;
      display: block;
    }

    /* SIGNALS PANEL */
    .signals-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .signals-list {
      flex: 1;
      overflow-y: auto;
      max-height: 420px;
      padding: 12px;
    }

    .signals-list::-webkit-scrollbar { width: 4px; }
    .signals-list::-webkit-scrollbar-track { background: var(--bg); }
    .signals-list::-webkit-scrollbar-thumb { background: var(--border-bright); }

    .signal-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .signal-item:last-child { border-bottom: none; }

    .signal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .signal-dot.bullish { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .signal-dot.bearish { background: var(--red); box-shadow: 0 0 6px var(--red); }

    .signal-info .pattern { font-size: 11px; color: var(--text-bright); }
    .signal-info .date { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .signal-badge {
      margin-left: auto;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      font-weight: 600;
    }
    .signal-badge.bullish { color: var(--green); border: 1px solid var(--green); background: var(--green-dim); }
    .signal-badge.bearish { color: var(--red); border: 1px solid var(--red); background: var(--red-dim); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    /* ERROR */
    .error-bar {
      background: var(--red-dim);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 14px 20px;
      font-size: 12px;
      letter-spacing: 0.04em;
      display: none;
    }

    /* LOADING */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,12,15,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.active { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Count badges in panel header */
    .count-badge {
      font-size: 10px;
      padding: 2px 8px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    @media (max-width: 900px) {
      .search-panel { grid-template-columns: 1fr 1fr; }
      .scan-btn { grid-column: span 2; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loading-text">Fetching market data...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <span></span><span></span><span></span>
    </div>
    <div>
      <h1>TAtool</h1>
      <p>Candlestick Pattern Detection · Technical Analysis</p>
    </div>
  </div>
  <div class="header-status" id="headerStatus">READY</div>
</header>

<main>
  <!-- Search -->
  <div class="search-panel">
    <div class="field">
      <label>NSE Ticker</label>
      <input type="text" id="ticker" placeholder="INFY, RELIANCE, HDFCBANK" />
    </div>
    <div class="field">
      <label>Period</label>
      <select id="period">
        <option value="1mo">1 Month</option>
        <option value="3mo" selected>3 Months</option>
        <option value="6mo">6 Months</option>
        <option value="1y">1 Year</option>
        <option value="5y">5 Years</option>
      </select>
    </div>
    <div class="field">
      <label>Interval</label>
      <select id="interval">
        <option value="1d" selected>Daily</option>
        <option value="1wk">Weekly</option>
        <option value="1mo">Monthly</option>
      </select>
    </div>
    <button class="scan-btn" id="scanBtn" onclick="runScan()">▶ Scan</button>
  </div>

  <!-- Error -->
  <div class="error-bar" id="errorBar"></div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="label">Last Close</div>
      <div class="value" id="statClose">—</div>
      <div class="sub" id="statChange">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Period High</div>
      <div class="value" id="statHigh">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Period Low</div>
      <div class="value" id="statLow">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Bullish Signals</div>
      <div class="value up" id="statBull">—</div>
    </div>
    <div class="stat-card bias-card neutral" id="biasCard">
      <div>
        <div class="bias-label">Overall Bias</div>
        <div class="bias-value" id="statBias">—</div>
      </div>
    </div>
  </div>

  <!-- Chart + Signals -->
  <div class="main-grid" id="mainGrid">
    <div class="chart-panel">
      <div class="panel-header">
        <span class="panel-title">Candlestick Chart</span>
        <span class="panel-ticker" id="chartLabel">—</span>
      </div>
      <canvas id="chartCanvas" height="380"></canvas>
    </div>

    <div class="signals-panel">
      <div class="panel-header">
        <span class="panel-title">Detected Patterns</span>
        <span class="count-badge" id="signalCount">0</span>
      </div>
      <div class="signals-list" id="signalsList">
        <div class="empty-state">Run a scan to detect<br/>candlestick patterns</div>
      </div>
    </div>
  </div>
</main>

<script>
  // ─── CANVAS CANDLESTICK CHART ─────────────────────────────────────────────
  function drawChart(candles, signals) {
    const canvas = document.getElementById('chartCanvas');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.clientWidth;
    const H = 380;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const PAD = { top: 24, right: 20, bottom: 48, left: 72 };
    const chartW = W - PAD.left - PAD.right;
    const chartH = H - PAD.top - PAD.bottom;

    // Price range
    const highs = candles.map(c => c.high);
    const lows  = candles.map(c => c.low);
    let maxP = Math.max(...highs);
    let minP = Math.min(...lows);
    const spread = maxP - minP;
    maxP += spread * 0.05;
    minP -= spread * 0.05;

    const toY = p => PAD.top + chartH - ((p - minP) / (maxP - minP)) * chartH;
    const toX = i => PAD.left + (i + 0.5) * (chartW / candles.length);
    const candleW = Math.max(2, (chartW / candles.length) * 0.6);

    // Grid lines
    const gridCount = 5;
    for (let i = 0; i <= gridCount; i++) {
      const p = minP + (maxP - minP) * (i / gridCount);
      const y = toY(p);
      ctx.beginPath();
      ctx.moveTo(PAD.left, y);
      ctx.lineTo(W - PAD.right, y);
      ctx.strokeStyle = '#1e2530';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Label
      ctx.fillStyle = '#4a5a6a';
      ctx.font = '10px IBM Plex Mono';
      ctx.textAlign = 'right';
      ctx.fillText('₹' + p.toFixed(0), PAD.left - 8, y + 4);
    }

    // Signal markers (vertical lines)
    const signalDates = new Set(signals.map(s => s.date));
    candles.forEach((c, i) => {
      if (signalDates.has(c.date)) {
        const sig = signals.find(s => s.date === c.date);
        ctx.beginPath();
        ctx.moveTo(toX(i), PAD.top);
        ctx.lineTo(toX(i), PAD.top + chartH);
        ctx.strokeStyle = sig.type === 'bullish' ? '#00e67620' : '#ff174420';
        ctx.lineWidth = Math.max(2, candleW);
        ctx.stroke();
      }
    });

    // Candles
    candles.forEach((c, i) => {
      const x  = toX(i);
      const oY = toY(c.open);
      const cY = toY(c.close);
      const hY = toY(c.high);
      const lY = toY(c.low);
      const bull = c.close >= c.open;
      const color = bull ? '#00e676' : '#ff1744';

      // Wick
      ctx.beginPath();
      ctx.moveTo(x, hY);
      ctx.lineTo(x, lY);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Body
      ctx.fillStyle = bull ? '#00e67640' : '#ff174440';
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      const bodyTop = Math.min(oY, cY);
      const bodyH   = Math.max(1, Math.abs(oY - cY));
      ctx.fillRect(x - candleW / 2, bodyTop, candleW, bodyH);
      ctx.strokeRect(x - candleW / 2, bodyTop, candleW, bodyH);
    });

    // Date labels (sparse)
    const step = Math.ceil(candles.length / 8);
    ctx.fillStyle = '#4a5a6a';
    ctx.font = '9px IBM Plex Mono';
    ctx.textAlign = 'center';
    candles.forEach((c, i) => {
      if (i % step === 0) {
        ctx.fillText(c.date.slice(5), toX(i), H - 10);
      }
    });
  }

  // ─── SCAN ────────────────────────────────────────────────────────────────
  async function runScan() {
    const ticker = document.getElementById('ticker').value.trim();
    if (!ticker) { showError('Please enter a ticker symbol.'); return; }

    const period   = document.getElementById('period').value;
    const interval = document.getElementById('interval').value;
    const btn      = document.getElementById('scanBtn');

    hideError();
    btn.disabled = true;
    document.getElementById('loader').classList.add('active');
    document.getElementById('headerStatus').textContent = 'SCANNING...';

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker, period, interval })
      });

      const data = await res.json();

      if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

      renderResults(data);
    } catch(e) {
      showError('Could not connect to server. Is Flask running?');
    } finally {
      btn.disabled = false;
      document.getElementById('loader').classList.remove('active');
      document.getElementById('headerStatus').textContent = 'READY';
    }
  }

  function renderResults(data) {
    // Stats
    const closeEl = document.getElementById('statClose');
    closeEl.textContent = '₹' + data.latest_close;
    closeEl.className = 'value ' + (data.change >= 0 ? 'up' : 'down');

    document.getElementById('statChange').textContent =
      (data.change >= 0 ? '+' : '') + data.change + ' (' + data.change_pct + '%)';

    document.getElementById('statHigh').textContent = '₹' + data.high;
    document.getElementById('statLow').textContent  = '₹' + data.low;
    document.getElementById('statBull').textContent = data.bullish_count;

    // Bias card
    const biasCard = document.getElementById('biasCard');
    biasCard.className = 'stat-card bias-card ' + data.bias.toLowerCase();
    document.getElementById('statBias').textContent = data.bias;

    document.getElementById('statsRow').classList.add('visible');
    document.getElementById('mainGrid').classList.add('visible');
    document.getElementById('chartLabel').textContent = data.ticker;

    // Chart
    drawChart(data.candles, data.detected);

    // Signals list
    const list = document.getElementById('signalsList');
    document.getElementById('signalCount').textContent = data.detected.length;

    if (!data.detected.length) {
      list.innerHTML = '<div class="empty-state">No patterns detected<br/>in this period</div>';
      return;
    }

    const sorted = [...data.detected].sort((a, b) => b.date.localeCompare(a.date));
    list.innerHTML = sorted.map(s => `
      <div class="signal-item">
        <div class="signal-dot ${s.type}"></div>
        <div class="signal-info">
          <div class="pattern">${s.pattern}</div>
          <div class="date">${s.date}</div>
        </div>
        <span class="signal-badge ${s.type}">${s.type.toUpperCase()}</span>
      </div>
    `).join('');
  }

  function showError(msg) {
    const bar = document.getElementById('errorBar');
    bar.textContent = '⚠ ' + msg;
    bar.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorBar').style.display = 'none';
  }

  // Enter key support
  document.getElementById('ticker').addEventListener('keydown', e => {
    if (e.key === 'Enter') runScan();
  });
</script>
</body>
</html>
